version: '3.8'

services:
  db:
    image: postgres:15
    container_name: playstation_postgres
    restart: always
    environment:
      POSTGRES_DB: playstation_db
      POSTGRES_USER: playstation_user
      POSTGRES_PASSWORD: playstation_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    container_name: playstation_backend
    restart: always
    depends_on:
      - db
    environment:
      - DB_NAME=playstation_db
      - DB_USER=playstation_user
      - DB_PASSWORD=playstation_pass
      - DB_HOST=db
      - DB_PORT=5432
    volumes:
      - .:/app
      - static_volume:/app/static
      - media_volume:/app/media
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 playstation_backend.wsgi:application"

  nginx:
    image: nginx:latest
    container_name: playstation_nginx
    restart: always
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/static
      - media_volume:/app/media

volumes:
  postgres_data:
  static_volume:
  media_volume: